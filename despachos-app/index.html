<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitud de Despacho — GEO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#ebebea;
  --text:#1a1a19;--text2:#5a5a57;--text3:#9a9894;
  --border:#e0dedd;--border2:#c8c7c4;
  --green:#25D366;--green2:#1ebe58;
  --ok-bg:#eaf3de;--ok-text:#27500a;
  --warn-bg:#faeeda;--warn-text:#633806;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;color:var(--text);background:var(--bg3);min-height:100vh}
.app{max-width:640px;margin:0 auto;padding:16px}
header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:19px;font-weight:700;color:var(--text)}
header p{font-size:12px;color:var(--text3);margin-top:2px}
.badge-geo{background:#1a3a6b;color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;letter-spacing:.04em}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
label{display:block;font-size:13px;color:var(--text2);margin-bottom:4px;margin-top:12px}
label:first-of-type{margin-top:0}
input,select,textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:9px 11px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--border2)}
input[readonly]{background:var(--bg2);color:var(--text2);cursor:default}
textarea{resize:vertical;min-height:60px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.col-labels{display:grid;grid-template-columns:2fr 90px 80px 36px;gap:8px;margin-bottom:5px;padding:0 2px}
.col-label{font-size:11px;color:var(--text3)}
.item-row{display:grid;grid-template-columns:2fr 90px 80px 36px;gap:8px;align-items:center;margin-bottom:8px}
.item-row input{margin:0}
.btn-add{width:100%;padding:9px;border:1px dashed var(--border2);border-radius:var(--radius);background:transparent;cursor:pointer;font-size:13px;color:var(--text2);margin-top:4px;transition:background .15s}
.btn-add:hover{background:var(--bg2)}
.btn-remove{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:22px;line-height:1;padding:0;width:36px;text-align:center}
.btn-wa{width:100%;padding:12px;border:none;border-radius:var(--radius);background:var(--green);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-wa:hover{background:var(--green2)}
.btn-wa:disabled{opacity:.5;cursor:not-allowed}
.wa-icon{width:20px;height:20px;fill:#fff;flex-shrink:0}
.preview{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;font-size:13px;font-family:'Courier New',monospace;white-space:pre-wrap;line-height:1.65;color:var(--text);word-break:break-word;margin-top:10px}
.toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a19;color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:999;white-space:nowrap}
.toast.show{display:block}
.tipo-selector{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tipo-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 10px;border:2px solid var(--border);border-radius:var(--radius);background:var(--bg);cursor:pointer;transition:all .15s;text-align:center}
.tipo-btn:hover{border-color:var(--border2);background:var(--bg2)}
.tipo-btn.active{border-color:#1a3a6b;background:#eef2fa}
.tipo-btn.active.proyecto{border-color:#b45309;background:#fef3e2}
.tipo-icon{font-size:22px}
.tipo-nombre{font-size:14px;font-weight:700;color:var(--text)}
.tipo-desc{font-size:11px;color:var(--text3)}
border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){.row2{grid-template-columns:1fr}.col-labels,.item-row{grid-template-columns:1fr 70px 60px 36px}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>📦 Solicitud de despacho</h1>
      <p>Almacén Ingeniería — GEOINFORMATICA S.A.</p>
    </div>
    <span class="badge-geo">GEO</span>
  </header>

  <div class="card" id="card-tipo">
    <div class="card-title">Tipo de solicitud</div>
    <div class="tipo-selector">
      <button class="tipo-btn active" id="btn-normal" onclick="setTipo('normal')">
        <span class="tipo-icon">📋</span>
        <span class="tipo-nombre">Normal</span>
        <span class="tipo-desc">Materiales o equipos varios</span>
      </button>
      <button class="tipo-btn" id="btn-proyecto" onclick="setTipo('proyecto')">
        <span class="tipo-icon">🏗</span>
        <span class="tipo-nombre">Proyecto</span>
        <span class="tipo-desc">Despacho con hoja y finiquito</span>
      </button>
    </div>
    <div id="bitrix-field" style="display:none;margin-top:12px">
      <label>Código Bitrix <span style="color:#b91c1c">*</span></label>
      <input id="bitrix" placeholder="Ej: 12345 — Código del proyecto en Bitrix" oninput="previewWA()">
    </div>
  </div>

  <div class="card">
    <div class="card-title">Datos generales</div>
    <div class="row2">
      <div>
        <label>Solicitante</label>
        <input id="solicitante" placeholder="Tu nombre completo" oninput="previewWA()">
      </div>
      <div>
        <label>Fecha requerida</label>
        <input type="date" id="fecha" oninput="previewWA()">
      </div>
    </div>
    <div class="row2">
      <div>
        <label>Bodega origen</label>
        <input id="origen" value="Tarjeta Bitrix" readonly>
      </div>
      <div>
        <label>Destino / proyecto</label>
        <input id="destino" placeholder="Cliente o proyecto" oninput="previewWA()">
      </div>
    </div>
    <label>Observaciones</label>
    <textarea id="obs" placeholder="Urgencia, instrucciones especiales, etc." oninput="previewWA()"></textarea>
  </div>

  <div class="card">
    <div class="card-title">Artículos solicitados</div>
    <div class="col-labels">
      <span class="col-label">Descripción</span>
      <span class="col-label">Unidad</span>
      <span class="col-label">Cantidad</span>
      <span></span>
    </div>
    <div id="items"></div>
    <button class="btn-add" onclick="addItem()">+ Agregar artículo</button>
  </div>

  <div class="card" id="preview-card" style="display:none">
    <div class="card-title">Vista previa — mensaje WhatsApp</div>
    <div class="preview" id="wa-text"></div>
  </div>

  <button class="btn-wa" id="btn-enviar" onclick="submitSolicitud()">
    <svg class="wa-icon" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    <div class="spinner" id="spinner"></div>
    <span id="btn-label">Generar y enviar por WhatsApp</span>
  </button>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let tipoSolicitud = 'normal';

function setTipo(t){
  tipoSolicitud = t;
  document.getElementById('btn-normal').className = 'tipo-btn' + (t==='normal'?' active':'');
  document.getElementById('btn-proyecto').className = 'tipo-btn' + (t==='proyecto'?' active proyecto':'');
  document.getElementById('bitrix-field').style.display = t==='proyecto' ? '' : 'none';
  previewWA();
}



function addItem(){
  const d = document.createElement('div');
  d.className = 'item-row';
  d.innerHTML = `<input class="it-desc" placeholder="Descripción" oninput="previewWA()">
    <input class="it-und" placeholder="und/m/kg" oninput="previewWA()">
    <input type="number" class="it-qty" value="1" min="1" oninput="previewWA()">
    <button class="btn-remove" onclick="this.parentElement.remove();previewWA()">×</button>`;
  document.getElementById('items').appendChild(d);
  previewWA();
}

function getItems(){
  return [...document.querySelectorAll('.item-row')].map(r=>({
    desc: r.querySelector('.it-desc').value.trim(),
    unidad: r.querySelector('.it-und').value.trim()||'und',
    qty: r.querySelector('.it-qty').value
  })).filter(i=>i.desc);
}

function buildMsg(s){
  const items = s.items.map((i,n)=>`  ${n+1}. ${i.desc} — ${i.qty} ${i.unidad}`).join('\n');
  const tipoLabel = s.tipo==='proyecto' ? '🏗 *SOLICITUD DE PROYECTO' : '📋 *SOLICITUD DE DESPACHO';
  const bitrixLine = s.tipo==='proyecto' && s.bitrix ? `🔢 Bitrix: ${s.bitrix}\n` : '';
  return `${tipoLabel} ${s.id}*\n📅 Fecha requerida: ${s.fecha}\n👤 Solicitante: ${s.solicitante}\n📦 Bodega origen: ${s.origen}\n📍 Destino: ${s.destino}\n${bitrixLine}`+(s.obs?`📝 Obs: ${s.obs}\n`:'')+`\n*Artículos:*\n${items}\n\n_Por favor confirmar recepción de esta solicitud._`;
}

function previewWA(){
  const items = getItems();
  const card = document.getElementById('preview-card');
  if(!items.length){ card.style.display='none'; return; }
  card.style.display='';
  document.getElementById('wa-text').textContent = buildMsg({
    id:'[ID]',
    solicitante: document.getElementById('solicitante').value||'—',
    fecha: document.getElementById('fecha').value||'—',
    origen: 'Tarjeta Bitrix',
    destino: document.getElementById('destino').value||'—',
    obs: document.getElementById('obs').value,
    tipo: tipoSolicitud,
    bitrix: document.getElementById('bitrix').value||'',
    items
  });
}

function toast(msg, dur=3000){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

async function getNextId(){
  const { data } = await sb.from('solicitudes').select('correlativo').order('correlativo',{ascending:false}).limit(1);
  return data && data.length ? data[0].correlativo + 1 : 1;
}

async function submitSolicitud(){
  const sol = document.getElementById('solicitante').value.trim();
  const des = document.getElementById('destino').value.trim();
  if(!sol||!des){ toast('⚠ Completá solicitante y destino'); return; }
  const bitrix = document.getElementById('bitrix').value.trim();
  if(tipoSolicitud==='proyecto' && !bitrix){ toast('⚠ Ingresá el código Bitrix del proyecto'); return; }
  const items = getItems();
  if(!items.length){ toast('⚠ Agregá al menos un artículo'); return; }

  const btn = document.getElementById('btn-enviar');
  btn.disabled = true;
  document.getElementById('spinner').style.display='block';
  document.getElementById('btn-label').textContent='Guardando...';

  const correlativo = await getNextId();
  const id = 'SD-' + String(correlativo).padStart(3,'0');
  const s = {
    correlativo,
    id,
    solicitante: sol,
    fecha_requerida: document.getElementById('fecha').value,
    origen: 'Tarjeta Bitrix',
    destino: des,
    observaciones: document.getElementById('obs').value.trim(),
    items: JSON.stringify(items),
    estado: 'Pendiente',
    tipo: tipoSolicitud,
    bitrix: tipoSolicitud==='proyecto' ? document.getElementById('bitrix').value.trim() : null,
    creado_en: new Date().toISOString()
  };

  const { error } = await sb.from('solicitudes').insert([s]);
  btn.disabled = false;
  document.getElementById('spinner').style.display='none';
  document.getElementById('btn-label').textContent='Generar y enviar por WhatsApp';

  if(error){ toast('❌ Error al guardar. Intentá de nuevo.'); console.error(error); return; }

  window.open('https://wa.me/50231117277?text='+encodeURIComponent(buildMsg({...s, items})),'_blank');
  limpiar();
  toast('✅ Solicitud '+id+' registrada correctamente', 4000);
}

function limpiar(){
  ['solicitante','destino','obs','bitrix'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fecha').value=new Date().toISOString().slice(0,10);
  document.getElementById('items').innerHTML='';
  document.getElementById('preview-card').style.display='none';
  setTipo('normal');
  addItem();
}

addItem();
</script>
</body>
</html>
