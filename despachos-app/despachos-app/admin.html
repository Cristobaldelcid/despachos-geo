<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Despacho — GEO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#ebebea;
  --text:#1a1a19;--text2:#5a5a57;--text3:#9a9894;
  --border:#e0dedd;--border2:#c8c7c4;
  --radius:8px;--radius-lg:12px;
  --ok-bg:#eaf3de;--ok-text:#27500a;--ok-border:#6ee7b7;
  --warn-bg:#faeeda;--warn-text:#633806;
  --info-bg:#e6f1fb;--info-text:#0c447c;
  --danger-bg:#fcebeb;--danger-text:#791f1f;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;color:var(--text);background:var(--bg3);min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:16px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:gap}
.header-left h1{font-size:19px;font-weight:700}
.header-left p{font-size:12px;color:var(--text3);margin-top:2px}
.badge-geo{background:#1a3a6b;color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.stat-num{font-size:26px;font-weight:700;line-height:1}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}
.stat-pend .stat-num{color:#b45309}
.stat-apro .stat-num{color:#15803d}
.stat-desp .stat-num{color:#185FA5}
.stat-total .stat-num{color:var(--text)}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:7px 14px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s}
.filter-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.btn-export{padding:7px 16px;border:none;border-radius:var(--radius);background:#15803d;color:#fff;font-size:13px;font-weight:500;cursor:pointer;margin-left:auto}
.btn-export:hover{background:#166534}
.btn-refresh{padding:7px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text2)}
table{width:100%;border-collapse:collapse;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;font-size:13px}
thead tr{background:var(--bg2);border-bottom:1px solid var(--border)}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.b-pend{background:var(--warn-bg);color:var(--warn-text)}
.b-apro{background:var(--ok-bg);color:var(--ok-text)}
.b-desp{background:var(--info-bg);color:var(--info-text)}
.b-proy{background:#fef3e2;color:#92400e;border:1px solid #f59e0b}
.b-devuelta{background:#f3e8ff;color:#6b21a8}
.fila-vencida td{background:#fff1f1!important}
.fila-vencida td:first-child{border-left:3px solid #dc2626}
.badge-vencida{display:inline-block;background:#dc2626;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:5px;vertical-align:middle}
.btn-dev{background:#f3e8ff;color:#6b21a8}
.btn-action{padding:5px 10px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;margin-right:4px;transition:opacity .15s}
.btn-action:hover{opacity:.8}
.btn-apro{background:var(--ok-bg);color:var(--ok-text)}
.btn-desp{background:var(--info-bg);color:var(--info-text)}
.btn-ver{background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.empty{text-align:center;padding:40px;color:var(--text3)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);padding:22px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.mrow{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-bottom:1px solid var(--border)}
.mrow:last-of-type{border:none}
.mrow span:first-child{color:var(--text2)}
.mrow span:last-child{font-weight:500;text-align:right;max-width:65%}
.mlabel{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px}
.modal-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn-sm{flex:1;min-width:80px;padding:9px 12px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:none}
.btn-gray{background:var(--bg2);color:var(--text);border:1px solid var(--border2)}
.btn-ok{background:#15803d;color:#fff}
.btn-info{background:#185FA5;color:#fff}
.btn-wa{background:#25D366;color:#fff}
.toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a19;color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:999}
.toast.show{display:block}
.loading{text-align:center;padding:30px;color:var(--text3);font-size:14px}
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr}.toolbar{flex-direction:column}.btn-export{margin-left:0}table{font-size:12px}th,td{padding:8px}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <h1>🗂 Control de despacho</h1>
      <p>GEOINFORMATICA S.A. — Panel de administración</p>
    </div>
    <span class="badge-geo">GEO</span>
  </header>

  <div class="stats">
    <div class="stat stat-total"><div class="stat-num" id="s-total">—</div><div class="stat-label">Total solicitudes</div></div>
    <div class="stat stat-pend"><div class="stat-num" id="s-pend">—</div><div class="stat-label">Pendientes</div></div>
    <div class="stat stat-apro"><div class="stat-num" id="s-apro">—</div><div class="stat-label">Aprobadas</div></div>
    <div class="stat stat-desp"><div class="stat-num" id="s-desp">—</div><div class="stat-label">Despachadas</div></div>
  </div>

  <div class="toolbar">
    <button class="filter-btn active" onclick="setFiltro('Todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFiltro('Pendiente',this)">Pendientes</button>
    <button class="filter-btn" onclick="setFiltro('Aprobada',this)">Aprobadas</button>
    <button class="filter-btn" onclick="setFiltro('Despachada',this)">Despachadas</button>
    <button class="filter-btn" style="border-color:#f59e0b;color:#92400e" onclick="setFiltro('Proyecto',this)">🏗 Proyectos</button>
    <button class="btn-refresh" onclick="cargar()">↻ Actualizar</button>
    <button class="btn-export" onclick="exportarExcel()">📥 Exportar Excel</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Fecha req.</th>
        <th>Solicitante</th>
        <th>Destino</th>
        <th>Artículos</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tabla-body">
      <tr><td colspan="7" class="loading">Cargando...</td></tr>
    </tbody>
  </table>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal" id="modal-inner"></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let todas = [];
let filtro = 'Todos';

async function cargar(){
  const { data, error } = await sb.from('solicitudes').select('*').order('correlativo', {ascending:false});
  if(error){ toast('❌ Error al cargar datos'); return; }
  todas = data || [];
  actualizarStats();
  renderTabla();
}

function actualizarStats(){
  document.getElementById('s-total').textContent = todas.length;
  document.getElementById('s-pend').textContent = todas.filter(s=>s.estado==='Pendiente').length;
  document.getElementById('s-apro').textContent = todas.filter(s=>s.estado==='Aprobada').length;
  document.getElementById('s-desp').textContent = todas.filter(s=>s.estado==='Despachada').length;
}

function setFiltro(f, btn){
  filtro = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTabla();
}

function renderTabla(){
  let lista;
  if(filtro==='Todos') lista = todas;
  else if(filtro==='Proyecto') lista = todas.filter(s=>s.tipo==='proyecto');
  else lista = todas.filter(s=>s.estado===filtro);
  const tbody = document.getElementById('tabla-body');
  if(!lista.length){ tbody.innerHTML='<tr><td colspan="7" class="empty">No hay solicitudes.</td></tr>'; return; }
  tbody.innerHTML = lista.map(s=>{
    const items = JSON.parse(s.items||'[]');
    const itemsStr = items.map(i=>`${i.desc} (${i.qty} ${i.unidad})`).join(', ');
    const badgeClass = s.estado==='Pendiente'?'b-pend':s.estado==='Aprobada'?'b-apro':'b-desp';
    const proyBadge = s.tipo==='proyecto' ? ` <span class="badge b-proy">Proyecto</span>` : '';
    // Alerta 3 dias sin devolver
    let diasDesp = 0, filaVencida = '';
    if (s.estado === 'Despachada' && s.despachado_en) {
      diasDesp = Math.floor((Date.now() - new Date(s.despachado_en)) / 86400000);
      if (diasDesp >= 3) filaVencida = 'fila-vencida';
    }
    const badgeVencida = filaVencida ? `<span class="badge-vencida">! ${diasDesp}d</span>` : '';
    const acciones = s.estado==='Pendiente'
      ? `<button class="btn-action btn-apro" onclick="cambiarEstado('${s.id}','Aprobada')">Aprobar</button><button class="btn-action btn-desp" onclick="cambiarEstado('${s.id}','Despachada')">Despachar</button>`
      : s.estado==='Aprobada'
      ? `<button class="btn-action btn-desp" onclick="cambiarEstado('${s.id}','Despachada')">Despachar</button>`
      : s.estado==='Despachada'
      ? `<button class="btn-action btn-dev" onclick="abrirDevolucion('${s.id}')">↩ Devolucion</button>`
      : s.estado==='Devuelta'
      ? `<button class="btn-action btn-dev" onclick="verDevolucion('${s.id}')">📋 Ver devolucion</button>`
      : '<span style="color:var(--text3);font-size:12px">Completado</span>';
    return `<tr class="${filaVencida}">
      <td><b>${s.id}</b>${proyBadge}${badgeVencida}</td>
      <td>${s.fecha_requerida||'—'}</td>
      <td>${s.solicitante}</td>
      <td>${s.destino}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${itemsStr}">${itemsStr}</td>
      <td><span class="badge ${badgeClass}">${s.estado}</span></td>
      <td>
        <button class="btn-action btn-ver" onclick="verDetalle('${s.id}')">Ver</button>
        ${acciones}
      </td>
    </tr>`;
  }).join('');
}

async function cambiarEstado(id, estado){
  const campo = estado==='Aprobada' ? {estado, aprobado_en: new Date().toISOString()} : {estado, despachado_en: new Date().toISOString()};
  const { error } = await sb.from('solicitudes').update(campo).eq('id', id);
  if(error){ toast('❌ Error al actualizar'); return; }
  toast(`✅ Solicitud ${id} marcada como ${estado}`);
  cargar();
}

function verDetalle(id){
  const s = todas.find(x=>x.id===id);
  if(!s) return;
  const items = JSON.parse(s.items||'[]');
  const badgeClass = s.estado==='Pendiente'?'b-pend':s.estado==='Aprobada'?'b-apro':'b-desp';
  const msg = buildMsg({...s, items});
  const msgEnc = encodeURIComponent(msg);
  const acciones = s.estado==='Pendiente'
    ? `<button class="btn-sm btn-ok" onclick="cambiarEstado('${s.id}','Aprobada');cerrarModalBtn()">Aprobar</button>
       <button class="btn-sm btn-info" onclick="cambiarEstado('${s.id}','Despachada');cerrarModalBtn()">Despachar</button>`
    : s.estado==='Aprobada'
    ? `<button class="btn-sm btn-info" onclick="cambiarEstado('${s.id}','Despachada');cerrarModalBtn()">Marcar despachada</button>`
    : '';
  document.getElementById('modal-inner').innerHTML = `
    <h3>${s.id} <span class="badge ${badgeClass}">${s.estado}</span></h3>
    <div class="mrow"><span>Solicitante</span><span>${s.solicitante}</span></div>
    <div class="mrow"><span>Bodega origen</span><span>${s.origen}</span></div>
    <div class="mrow"><span>Destino</span><span>${s.destino}</span></div>
    ${s.tipo==='proyecto'?`<div class="mrow"><span>🏗 Código Bitrix</span><span style="font-weight:700;color:#92400e">${s.bitrix||'—'}</span></div>`:''}
    <div class="mrow"><span>Fecha requerida</span><span>${s.fecha_requerida||'—'}</span></div>
    ${s.observaciones?`<div class="mrow"><span>Observaciones</span><span>${s.observaciones}</span></div>`:''}
    ${s.aprobado_en?`<div class="mrow"><span>Aprobado el</span><span>${new Date(s.aprobado_en).toLocaleString('es')}</span></div>`:''}
    ${s.despachado_en?`<div class="mrow"><span>Despachado el</span><span>${new Date(s.despachado_en).toLocaleString('es')}</span></div>`:''}
    <div class="mlabel">Artículos</div>
    ${items.map(i=>`<div class="mrow"><span>${i.desc}</span><span>${i.qty} ${i.unidad}</span></div>`).join('')}
    <div class="modal-actions">
      <button class="btn-sm btn-gray" onclick="cerrarModalBtn()">Cerrar</button>
      ${acciones}
      <button class="btn-sm btn-wa" onclick="window.open('https://wa.me/50231117277?text=${msgEnc}','_blank')">📲 WhatsApp</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function buildMsg(s){
  const items = Array.isArray(s.items) ? s.items : JSON.parse(s.items||'[]');
  const lineas = items.map((i,n)=>`  ${n+1}. ${i.desc} — ${i.qty} ${i.unidad}`).join('\n');
  return `🏗 *SOLICITUD DE DESPACHO ${s.id}*\n📅 Fecha requerida: ${s.fecha_requerida}\n👤 Solicitante: ${s.solicitante}\n📦 Bodega origen: ${s.origen}\n📍 Destino: ${s.destino}\n`+(s.observaciones?`📝 Obs: ${s.observaciones}\n`:'')+`\n*Artículos:*\n${lineas}\n\n_Por favor confirmar recepción de esta solicitud._`;
}

function exportarExcel(){
  if(!todas.length){ toast('No hay datos para exportar'); return; }
  const rows = todas.map(s=>{
    const items = JSON.parse(s.items||'[]');
    return {
      'ID': s.id,
      'Solicitante': s.solicitante,
      'Fecha requerida': s.fecha_requerida,
      'Bodega origen': s.origen,
      'Destino': s.destino,
      'Observaciones': s.observaciones||'',
      'Artículos': items.map(i=>`${i.desc} (${i.qty} ${i.unidad})`).join('; '),
      'Estado': s.estado,
      'Creado': s.creado_en ? new Date(s.creado_en).toLocaleString('es') : '',
      'Aprobado': s.aprobado_en ? new Date(s.aprobado_en).toLocaleString('es') : '',
      'Despachado': s.despachado_en ? new Date(s.despachado_en).toLocaleString('es') : ''
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Solicitudes');
  const fecha = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `despachos_GEO_${fecha}.xlsx`);
  toast('✅ Excel descargado');
}

function cerrarModal(e){ if(e.target===document.getElementById('modal-overlay')) cerrarModalBtn(); }
function cerrarModalBtn(){ document.getElementById('modal-overlay').classList.remove('open'); }
function toast(msg, dur=3000){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),dur); }

// ===== DEVOLUCION =====
function abrirDevolucion(id){
  const s = todas.find(x=>x.id===id);
  if(!s) return;
  const items = JSON.parse(s.items||'[]');
  const filas = items.map((it,i)=>`
    <tr>
      <td>${it.desc}</td>
      <td style="text-align:center">${it.unidad}</td>
      <td style="text-align:center;font-weight:700">${it.qty}</td>
      <td style="text-align:center"><input type="number" min="0" max="${it.qty}" value="0" id="uso_${i}" style="width:58px;padding:4px;border:1px solid #ddd;border-radius:5px;text-align:center"></td>
      <td style="text-align:center"><input type="number" min="0" max="${it.qty}" value="0" id="dev_${i}" style="width:58px;padding:4px;border:1px solid #a8d8bb;border-radius:5px;text-align:center;background:#e6f4ec"></td>
    </tr>`).join('');
  document.getElementById('modal-inner').innerHTML = `
    <h3 style="color:#6b21a8">↩ Devolucion — ${s.id}</h3>
    <div class="mrow"><span>Destino</span><span>${s.destino}</span></div>
    <div class="mrow"><span>Solicitante</span><span>${s.solicitante}</span></div>
    <div class="mlabel">Articulos — ingresa usado y devuelto</div>
    <div style="overflow-x:auto;margin-bottom:12px">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:#f3e8ff">
          <th style="padding:6px 8px;text-align:left">Articulo</th>
          <th style="padding:6px 8px;text-align:center">Unidad</th>
          <th style="padding:6px 8px;text-align:center">Despachado</th>
          <th style="padding:6px 8px;text-align:center;color:#b42a2a">Usado</th>
          <th style="padding:6px 8px;text-align:center;color:#1a7a3b">Devuelto</th>
        </tr></thead>
        <tbody>${filas}</tbody>
      </table>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div>
        <label style="font-size:11px;font-weight:700;color:#5c5c58;display:block;margin-bottom:4px">No. Boleta verde</label>
        <input type="text" id="dev-boleta" placeholder="Ej. 000027" style="width:100%;padding:7px 9px;border:1px solid #ddd;border-radius:6px;font-size:13px">
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#5c5c58;display:block;margin-bottom:4px">Recibio bodega</label>
        <input type="text" id="dev-recibe" placeholder="Nombre" style="width:100%;padding:7px 9px;border:1px solid #ddd;border-radius:6px;font-size:13px">
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn-sm btn-gray" onclick="cerrarModalBtn()">Cancelar</button>
      <button class="btn-sm" style="background:#6b21a8;color:#fff" onclick="guardarDevolucion('${s.id}',${items.length})">💾 Guardar devolucion</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

async function guardarDevolucion(id, nItems){
  const s = todas.find(x=>x.id===id);
  if(!s) return;
  const items = JSON.parse(s.items||'[]');
  const devItems = items.map((it,i)=>({
    desc: it.desc,
    unidad: it.unidad,
    despachado: it.qty,
    usado: parseFloat(document.getElementById('uso_'+i)?.value)||0,
    devuelto: parseFloat(document.getElementById('dev_'+i)?.value)||0
  }));
  const devData = {
    items: devItems,
    boleta: document.getElementById('dev-boleta')?.value||'',
    recibe: document.getElementById('dev-recibe')?.value||'',
    fecha: new Date().toISOString()
  };
  const { error } = await sb.from('solicitudes').update({
    devolucion: JSON.stringify(devData),
    estado: 'Devuelta'
  }).eq('id', id);
  if(error){ toast('Error al guardar devolucion'); return; }
  toast('Devolucion registrada correctamente');
  cerrarModalBtn();
  cargar();
}

function verDevolucion(id){
  const s = todas.find(x=>x.id===id);
  if(!s || !s.devolucion) { toast('Sin devolucion registrada'); return; }
  const dev = typeof s.devolucion === 'string' ? JSON.parse(s.devolucion) : s.devolucion;
  const filas = (dev.items||[]).map(it=>`
    <tr>
      <td>${it.desc}</td>
      <td style="text-align:center">${it.unidad}</td>
      <td style="text-align:center">${it.despachado}</td>
      <td style="text-align:center;color:#b42a2a;font-weight:600">${it.usado}</td>
      <td style="text-align:center;color:#1a7a3b;font-weight:600">${it.devuelto}</td>
    </tr>`).join('');
  document.getElementById('modal-inner').innerHTML = `
    <h3 style="color:#6b21a8">📋 Devolucion — ${s.id}</h3>
    <div class="mrow"><span>Destino</span><span>${s.destino}</span></div>

    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
