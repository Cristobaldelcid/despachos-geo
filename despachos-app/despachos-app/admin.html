<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Despacho — GEO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#ebebea;
  --text:#1a1a19;--text2:#5a5a57;--text3:#9a9894;
  --border:#e0dedd;--border2:#c8c7c4;
  --ok-bg:#eaf3de;--ok-text:#27500a;
  --warn-bg:#faeeda;--warn-text:#633806;
  --info-bg:#e6f1fb;--info-text:#0c447c;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;color:var(--text);background:var(--bg3);min-height:100vh}
.app{max-width:1000px;margin:0 auto;padding:16px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.header-left h1{font-size:19px;font-weight:700}
.header-left p{font-size:12px;color:var(--text3);margin-top:2px}
.badge-geo{background:#1a3a6b;color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.stat-num{font-size:26px;font-weight:700;line-height:1}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}
.stat-pend .stat-num{color:#b45309}
.stat-apro .stat-num{color:#15803d}
.stat-desp .stat-num{color:#185FA5}
.stat-total .stat-num{color:var(--text)}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:7px 14px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text2)}
.filter-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.btn-export{padding:8px 16px;border:none;border-radius:var(--radius);background:#15803d;color:#fff;font-size:13px;font-weight:500;cursor:pointer;margin-left:auto}
.btn-refresh{padding:7px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text2)}
table{width:100%;border-collapse:collapse;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;font-size:13px}
thead tr{background:var(--bg2);border-bottom:1px solid var(--border)}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.b-pend{background:var(--warn-bg);color:var(--warn-text)}
.b-apro{background:var(--ok-bg);color:var(--ok-text)}
.b-desp{background:var(--info-bg);color:var(--info-text)}
.b-dev{background:#f3e8ff;color:#6b21a8}
.btn-action{padding:5px 10px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;margin-right:4px;margin-bottom:2px;display:inline-block}
.btn-apro{background:var(--ok-bg);color:var(--ok-text)}
.btn-desp{background:var(--info-bg);color:var(--info-text)}
.btn-ver{background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.btn-pdf{background:#dc2626;color:#fff}
.btn-dev{background:#f3e8ff;color:#6b21a8}
.empty{text-align:center;padding:40px;color:var(--text3)}
.loading{text-align:center;padding:30px;color:var(--text3);font-size:14px}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);padding:22px;width:100%;max-width:600px;margin:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.mrow{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-bottom:1px solid var(--border)}
.mrow:last-of-type{border:none}
.mrow span:first-child{color:var(--text2)}
.mrow span:last-child{font-weight:500;text-align:right;max-width:65%}
.mlabel{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px}
.modal-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn-sm{flex:1;min-width:80px;padding:9px 12px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:none}
.btn-gray{background:var(--bg2);color:var(--text);border:1px solid var(--border2)}
.btn-ok{background:#15803d;color:#fff}
.btn-info{background:#185FA5;color:#fff}
.btn-wa{background:#25D366;color:#fff}
.btn-red{background:#dc2626;color:#fff}
.btn-purple{background:#7c3aed;color:#fff}
.btn-orange{background:#b45309;color:#fff}
/* Firma */
.firma-area{border:2px dashed var(--border2);border-radius:var(--radius);background:var(--bg2);margin:6px 0;position:relative;overflow:hidden;min-height:110px}
.firma-area canvas{display:block;touch-action:none}
.firma-label{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text3);pointer-events:none;white-space:nowrap}
.firma-btn-limpiar{padding:4px 10px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);cursor:pointer;font-size:11px;color:var(--text2);margin-bottom:4px}
/* Devolucion */
.dev-table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
.dev-table th{background:var(--bg2);padding:8px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--text3);border-bottom:1px solid var(--border)}
.dev-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.dev-table input[type=number]{width:70px;border:1px solid var(--border2);border-radius:6px;padding:5px 8px;font-size:13px;text-align:center}
.dev-result{font-weight:700;color:#185FA5}
.toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a19;color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:999}
.toast.show{display:block}
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr}table{font-size:12px}th,td{padding:8px}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <h1>🗂 Control de despacho</h1>
      <p>GEOINFORMATICA S.A. — Panel de administración</p>
    </div>
    <span class="badge-geo">GEO</span>
  </header>
  <div class="stats">
    <div class="stat stat-total"><div class="stat-num" id="s-total">—</div><div class="stat-label">Total solicitudes</div></div>
    <div class="stat stat-pend"><div class="stat-num" id="s-pend">—</div><div class="stat-label">Pendientes</div></div>
    <div class="stat stat-apro"><div class="stat-num" id="s-apro">—</div><div class="stat-label">Aprobadas</div></div>
    <div class="stat stat-desp"><div class="stat-num" id="s-desp">—</div><div class="stat-label">Despachadas</div></div>
  </div>
  <div class="toolbar">
    <button class="filter-btn active" onclick="setFiltro('Todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFiltro('Pendiente',this)">Pendientes</button>
    <button class="filter-btn" onclick="setFiltro('Aprobada',this)">Aprobadas</button>
    <button class="filter-btn" onclick="setFiltro('Despachada',this)">Despachadas</button>
    <button class="btn-refresh" onclick="cargar()">↻ Actualizar</button>
    <button class="btn-export" onclick="exportarExcel()">📥 Exportar Excel</button>
  </div>
  <table>
    <thead>
      <tr><th>ID</th><th>Fecha req.</th><th>Solicitante</th><th>Destino</th><th>Artículos</th><th>Estado</th><th>Acciones</th></tr>
    </thead>
    <tbody id="tabla-body"><tr><td colspan="7" class="loading">Cargando...</td></tr></tbody>
  </table>
</div>
<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal" id="modal-inner"></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let todas = [];
let filtro = 'Todos';
let isDrawing = false, lastX = 0, lastY = 0, firmaActiva = null;

// ===== CARGA DE DATOS =====
async function cargar() {
  const { data, error } = await sb.from('solicitudes').select('*').order('correlativo', { ascending: false });
  if (error) { toast('❌ Error al cargar datos'); return; }
  todas = data || [];
  actualizarStats();
  renderTabla();
}

function actualizarStats() {
  document.getElementById('s-total').textContent = todas.length;
  document.getElementById('s-pend').textContent = todas.filter(s => s.estado === 'Pendiente').length;
  document.getElementById('s-apro').textContent = todas.filter(s => s.estado === 'Aprobada').length;
  document.getElementById('s-desp').textContent = todas.filter(s => s.estado === 'Despachada').length;
}

function setFiltro(f, btn) {
  filtro = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTabla();
}

function renderTabla() {
  const lista = filtro === 'Todos' ? todas : todas.filter(s => s.estado === filtro);
  const tbody = document.getElementById('tabla-body');
  if (!lista.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">No hay solicitudes.</td></tr>'; return; }
  tbody.innerHTML = lista.map(s => {
    const items = JSON.parse(s.items || '[]');
    const itemsStr = items.map(i => `${i.desc}(${i.qty} ${i.unidad})`).join(', ');
    const bc = s.estado === 'Pendiente' ? 'b-pend' : s.estado === 'Aprobada' ? 'b-apro' : s.estado === 'Despachada' ? 'b-desp' : 'b-dev';
    let acc = `<button class="btn-action btn-ver" onclick="verDetalle('${s.id}')">Ver</button>`;
    if (s.estado === 'Pendiente') {
      acc += `<button class="btn-action btn-apro" onclick="cambiarEstado('${s.id}','Aprobada')">Aprobar</button>
              <button class="btn-action btn-desp" onclick="cambiarEstado('${s.id}','Despachada')">Despachar</button>`;
    } else if (s.estado === 'Aprobada') {
      acc += `<button class="btn-action btn-desp" onclick="cambiarEstado('${s.id}','Despachada')">Despachar</button>
              <button class="btn-action btn-pdf" onclick="abrirFirmaDespacho('${s.id}')">📄 Hoja PDF</button>`;
    } else if (s.estado === 'Despachada') {
      acc += `<button class="btn-action btn-pdf" onclick="abrirFirmaDespacho('${s.id}')">📄 Hoja PDF</button>
              <button class="btn-action btn-dev" onclick="abrirDevolucion('${s.id}')">↩ Devolución</button>`;
    } else if (s.estado === 'Devuelta') {
      acc += `<button class="btn-action btn-pdf" onclick="abrirFirmaDespacho('${s.id}')">📄 Despacho</button>
              <button class="btn-action btn-dev" onclick="verDevolucion('${s.id}')">📋 Ver devolución</button>`;
    }
    return `<tr>
      <td><b>${s.id}</b></td>
      <td>${s.fecha_requerida || '—'}</td>
      <td>${s.solicitante}</td>
      <td>${s.destino}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${itemsStr}">${itemsStr}</td>
      <td><span class="badge ${bc}">${s.estado}</span></td>
      <td>${acc}</td>
    </tr>`;
  }).join('');
}

async function cambiarEstado(id, estado) {
  const campo = estado === 'Aprobada' ? { estado, aprobado_en: new Date().toISOString() } : { estado, despachado_en: new Date().toISOString() };
  const { error } = await sb.from('solicitudes').update(campo).eq('id', id);
  if (error) { toast('❌ Error al actualizar'); return; }
  toast(`✅ Solicitud ${id} marcada como ${estado}`);
  cargar();
}

// ===== VER DETALLE =====
function verDetalle(id) {
  const s = todas.find(x => x.id === id);
  if (!s) return;
  const items = JSON.parse(s.items || '[]');
  const bc = s.estado === 'Pendiente' ? 'b-pend' : s.estado === 'Aprobada' ? 'b-apro' : s.estado === 'Despachada' ? 'b-desp' : 'b-dev';
  const msgEnc = encodeURIComponent(buildMsg(s));
  let botones = `<button class="btn-sm btn-gray" onclick="cerrarModalBtn()">Cerrar</button>`;
  if (s.estado === 'Pendiente') {
    botones += `<button class="btn-sm btn-ok" onclick="cambiarEstado('${s.id}','Aprobada');cerrarModalBtn()">Aprobar</button>
                <button class="btn-sm btn-info" onclick="cambiarEstado('${s.id}','Despachada');cerrarModalBtn()">Despachar</button>`;
  } else if (s.estado === 'Aprobada') {
    botones += `<button class="btn-sm btn-info" onclick="cambiarEstado('${s.id}','Despachada');cerrarModalBtn()">Despachar</button>
                <button class="btn-sm btn-red" onclick="cerrarModalBtn();abrirFirmaDespacho('${s.id}')">📄 Hoja PDF</button>`;
  } else if (s.estado === 'Despachada') {
    botones += `<button class="btn-sm btn-red" onclick="cerrarModalBtn();abrirFirmaDespacho('${s.id}')">📄 Hoja PDF</button>
                <button class="btn-sm btn-purple" onclick="cerrarModalBtn();abrirDevolucion('${s.id}')">↩ Devolución</button>`;
  } else if (s.estado === 'Devuelta') {
    botones += `<button class="btn-sm btn-red" onclick="cerrarModalBtn();abrirFirmaDespacho('${s.id}')">📄 Despacho</button>
                <button class="btn-sm btn-purple" onclick="cerrarModalBtn();verDevolucion('${s.id}')">📋 Ver devolución</button>`;
  }
  botones += `<button class="btn-sm btn-wa" onclick="window.open('https://wa.me/50231117277?text=${msgEnc}','_blank')">📲 WA</button>`;
  document.getElementById('modal-inner').innerHTML = `
    <h3>${s.id} <span class="badge ${bc}">${s.estado}</span></h3>
    <div class="mrow"><span>Solicitante</span><span>${s.solicitante}</span></div>
    <div class="mrow"><span>Bodega origen</span><span>${s.origen}</span></div>
    <div class="mrow"><span>Destino</span><span>${s.destino}</span></div>
    <div class="mrow"><span>Fecha requerida</span><span>${s.fecha_requerida || '—'}</span></div>
    ${s.observaciones ? `<div class="mrow"><span>Observaciones</span><span>${s.observaciones}</span></div>` : ''}
    ${s.aprobado_en ? `<div class="mrow"><span>Aprobado</span><span>${new Date(s.aprobado_en).toLocaleString('es')}</span></div>` : ''}
    ${s.despachado_en ? `<div class="mrow"><span>Despachado</span><span>${new Date(s.despachado_en).toLocaleString('es')}</span></div>` : ''}
    <div class="mlabel">Artículos</div>
    ${items.map(i => `<div class="mrow"><span>${i.desc}</span><span>${i.qty} ${i.unidad}</span></div>`).join('')}
    <div class="modal-actions">${botones}</div>`;
  abrirModalOverlay();
}

// ===== HOJA DE DESPACHO + FIRMA DIGITAL =====
function infoHTML(s) {
  const items = JSON.parse(s.items || '[]');
  return `<div style="background:var(--bg2);border-radius:var(--radius);padding:12px;margin-bottom:12px;font-size:13px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      <div><b>ID:</b> ${s.id}</div>
      <div><b>Fecha:</b> ${s.fecha_requerida || '—'}</div>
      <div><b>Solicitante:</b> ${s.solicitante}</div>
      <div><b>Destino:</b> ${s.destino}</div>
      <div><b>Origen:</b> ${s.origen}</div>
      ${s.observaciones ? `<div><b>Obs:</b> ${s.observaciones}</div>` : ''}
    </div>
    <div style="margin-top:8px;font-size:12px;color:var(--text2)">
      ${items.map((i, n) => `${n + 1}. ${i.desc} — ${i.qty} ${i.unidad}`).join(' | ')}
    </div>
  </div>`;
}

function abrirFirmaDespacho(id) {
  const s = todas.find(x => x.id === id);
  if (!s) return;
  const yaFirmado = s.firma_entrega || s.firma_recibe;
  if (yaFirmado) {
    // Mostrar firmas guardadas
    document.getElementById('modal-inner').innerHTML = `
      <h3>📄 Hoja de Despacho — ${s.id}</h3>
      <div style="background:var(--ok-bg);border-radius:var(--radius);padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--ok-text)">
        ✅ Esta hoja ya tiene firmas guardadas.
      </div>
      ${infoHTML(s)}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div>
          <div class="mlabel">Firma — Entrega (Luis)</div>
          <div class="firma-area" style="padding:8px">
            ${s.firma_entrega ? `<img src="${s.firma_entrega}" style="max-width:100%;height:90px;object-fit:contain">` : '<div style="height:90px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px">Sin firma</div>'}
          </div>
        </div>
        <div>
          <div class="mlabel">Firma — Recibe (Técnico)</div>
          <div class="firma-area" style="padding:8px">
            ${s.firma_recibe ? `<img src="${s.firma_recibe}" style="max-width:100%;height:90px;object-fit:contain">` : '<div style="height:90px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px">Sin firma</div>'}
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-sm btn-gray" onclick="cerrarModalBtn()">Cerrar</button>
        <button class="btn-sm btn-orange" onclick="resetFirmas('${s.id}')">🔄 Refirmar</button>
        <button class="btn-sm btn-red" onclick="generarPDFDespacho('${s.id}')">🖨 Imprimir / PDF</button>
      </div>`;
    abrirModalOverlay();
  } else {
    // Sin firmas — canvas para firmar
    document.getElementById('modal-inner').innerHTML = `
      <h3>📄 Hoja de Despacho — ${s.id}</h3>
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px">Firmá digitalmente y luego guardá para generar el PDF.</p>
      ${infoHTML(s)}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <div class="mlabel">✍ Firma — Entrega (Luis)</div>
          <button class="firma-btn-limpiar" onclick="limpiarCanvas('c-entrega')">Limpiar</button>
          <div class="firma-area">
            <canvas id="c-entrega" width="260" height="100"></canvas>
            <span class="firma-label">Firma de entrega</span>
          </div>
        </div>
        <div>
          <div class="mlabel">✍ Firma — Recibe (Técnico)</div>
          <button class="firma-btn-limpiar" onclick="limpiarCanvas('c-recibe')">Limpiar</button>
          <div class="firma-area">
            <canvas id="c-recibe" width="260" height="100"></canvas>
            <span class="firma-label">Firma de recepción</span>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-sm btn-gray" onclick="cerrarModalBtn()">Cerrar</button>
        <button class="btn-sm btn-ok" onclick="guardarYGenerarPDF('${s.id}')">💾 Guardar y generar PDF</button>
      </div>`;
    abrirModalOverlay();
    setTimeout(() => { iniciarCanvas('c-entrega'); iniciarCanvas('c-recibe'); }, 100);
  }
}

async function resetFirmas(id) {
  if (!confirm('¿Borrar las firmas actuales para volver a firmar?')) return;
  const { error } = await sb.from('solicitudes').update({ firma_entrega: null, firma_recibe: null }).eq('id', id);
  if (error) { toast('❌ Error'); return; }
  await cargar();
  abrirFirmaDespacho(id);
}

async function guardarYGenerarPDF(id) {
  const fe = canvasToBase64('c-entrega');
  const fr = canvasToBase64('c-recibe');
  if (!fe && !fr) { toast('⚠ Dibujá al menos una firma'); return; }
  const { error } = await sb.from('solicitudes').update({ firma_entrega: fe, firma_recibe: fr }).eq('id', id);
  if (error) { toast('❌ Error al guardar firmas'); return; }
  toast('✅ Firmas guardadas');
  await cargar();
  const s = todas.find(x => x.id === id);
  if (s) imprimirDespacho(s, fe, fr);
  cerrarModalBtn();
}

function generarPDFDespacho(id) {
  const s = todas.find(x => x.id === id);
  if (!s) return;
  imprimirDespacho(s, s.firma_entrega, s.firma_recibe);
}

function imprimirDespacho(s, fe, fr) {
  const items = JSON.parse(s.items || '[]');
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Despacho ${s.id}</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:12px;padding:20px}
  .hdr{background:#1a3a6b;color:#fff;padding:12px 16px;border-radius:6px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
  .hdr h1{font-size:15px}.hdr p{font-size:10px;opacity:.8;margin-top:2px}
  .badge{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700}

// ===== DEVOLUCIÓN =====
function abrirDevolucion(id) {
  const s = todas.find(x => x.id === id);
  if (!s) return;
  const items = JSON.parse(s.items || '[]');
  const filas = items.map((item, i) => `

      <td style="text-align:center"><input type="number" id="usado_${i}" value="${item.qty}" min="0" max="${item.qty}" oninput="calcDev(${i},${item.qty})"></td>
      <td style="text-align:center" id="dev_${i}" class="dev-result">0</td>
    </tr>`).join('');

  document.getElementById('modal-inner').innerHTML = `
    <h3>↩ Devolución — ${s.id}</h3>
    <p style="font-size:12px;color:var(--text2);margin-bottom:10px">
      Ingresá cuánto se <b>usó</b>. La cantidad a devolver se calcula sola.
    </p>
    <table class="dev-table">
      <thead><tr><th>Artículo</th><th>Unidad</th><th>Despachado</th><th>Usado</th><th>A devolver</th></tr></thead>
      <tbody>${filas}</tbody>
    </table>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px">
      <div>
        <div class="mlabel">✍ Firma — Devuelve (Técnico)</div>
        <button class="firma-btn-limpiar" onclick="limpiarCanvas('c-dev-tec')">Limpiar</button>
        <div class="firma-area"><canvas id="c-dev-tec" width="260" height="90"></canvas><span class="firma-label">Técnico que devuelve</span></div>
      </div>
      <div>
        <div class="mlabel">✍ Firma — Recibe bodega (Luis)</div>
        <button class="firma-btn-limpiar" onclick="limpiarCanvas('c-dev-bod')">Limpiar</button>
        <div class="firma-area"><canvas id="c-dev-bod" width="260" height="90"></canvas><span class="firma-label">Bodega que recibe</span></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-sm btn-gray" onclick="cerrarModalBtn()">Cancelar</button>
      <button class="btn-sm btn-red" onclick="imprimirDevolucion('${s.id}')">🖨 Hoja PDF</button>
      <button class="btn-sm btn-purple" onclick="guardarDevolucion('${s.id}')">💾 Guardar devolución</button>
    </div>`;
  abrirModalOverlay();
  setTimeout(() => {
    items.forEach((_, i) => calcDev(i, items[i].qty));
    iniciarCanvas('c-dev-tec');
    iniciarCanvas('c-dev-bod');
  }, 100);
}

function calcDev(i, total) {
  const usado = parseFloat(document.getElementById(`usado_${i}`)?.value) || 0;
  const dev = Math.max(0, total - usado);
  const el = document.getElementById(`dev_${i}`);
  if (el) { el.textContent = dev; el.style.color = dev > 0 ? '#185FA5' : '#15803d'; }
}

function getDevItems(id) {
  const s = todas.find(x => x.id === id);
  if (!s) return [];
  return JSON.parse(s.items || '[]').map((item, i) => {
    const usado = parseFloat(document.getElementById(`usado_${i}`)?.value) || 0;
    return { desc: item.desc, unidad: item.unidad, despachado: item.qty, usado, devuelve: Math.max(0, item.qty - usado) };
  });
}

async function guardarDevolucion(id) {
  const devItems = getDevItems(id);
  const ft = canvasToBase64('c-dev-tec');
  const fb = canvasToBase64('c-dev-bod');
  const devData = { items: devItems, fecha: new Date().toISOString(), firma_tecnico: ft, firma_bodega: fb };
  const { error } = await sb.from('solicitudes').update({ devolucion: JSON.stringify(devData), estado: 'Devuelta' }).eq('id', id);
  if (error) { toast('❌ Error al guardar devolución'); return; }
  toast('✅ Devolución registrada');
  cerrarModalBtn();
  cargar();
}

// ===== CANVAS FIRMA =====
function iniciarCanvas(id) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#1a3a6b';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  const getPos = e => {
    const r = canvas.getBoundingClientRect();
    if (e.touches) return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  };
  canvas.onmousedown = e => { isDrawing = true; firmaActiva = id; const p = getPos(e); lastX = p.x; lastY = p.y; };
  canvas.onmousemove = e => {
    if (!isDrawing || firmaActiva !== id) return;
    const p = getPos(e);
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
    lastX = p.x; lastY = p.y;
  };
  canvas.onmouseup = () => { isDrawing = false; };
  canvas.ontouchstart = e => { e.preventDefault(); isDrawing = true; firmaActiva = id; const p = getPos(e); lastX = p.x; lastY = p.y; };
  canvas.ontouchmove = e => {
    e.preventDefault();
    if (!isDrawing || firmaActiva !== id) return;
    const p = getPos(e);
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
    lastX = p.x; lastY = p.y;
  };
  canvas.ontouchend = () => { isDrawing = false; };
}

function limpiarCanvas(id) {
  const canvas = document.getElementById(id);
  if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

function canvasToBase64(id) {
  const canvas = document.getElementById(id);
  if (!canvas) return null;
  const data = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;
  return data.some((v, i) => i % 4 === 3 && v > 0) ? canvas.toDataURL('image/png') : null;
}

function buildMsg(s) {
  const items = JSON.parse(s.items || '[]');
  const lineas = items.map((i, n) => `  ${n + 1}. ${i.desc} — ${i.qty} ${i.unidad}`).join('\n');
  return `🏗 *SOLICITUD DE DESPACHO ${s.id}*\n📅 Fecha requerida: ${s.fecha_requerida}\n👤 Solicitante: ${s.solicitante}\n📦 Bodega origen: ${s.origen}\n📍 Destino: ${s.destino}\n` + (s.observaciones ? `📝 Obs: ${s.observaciones}\n` : '') + `\n*Artículos:*\n${lineas}\n\n_Por favor confirmar recepción de esta solicitud._`;
}

function exportarExcel() {
  if (!todas.length) { toast('No hay datos'); return; }
  const rows = todas.map(s => {
    const items = JSON.parse(s.items || '[]');
    const dev = s.devolucion ? JSON.parse(s.devolucion) : null;
    return {
      'ID': s.id, 'Solicitante': s.solicitante, 'Fecha requerida': s.fecha_requerida,
      'Bodega origen': s.origen, 'Destino': s.destino, 'Observaciones': s.observaciones || '',
      'Artículos': items.map(i => `${i.desc}(${i.qty} ${i.unidad})`).join('; '),
      'Estado': s.estado,
      'Creado': s.creado_en ? new Date(s.creado_en).toLocaleString('es') : '',
      'Aprobado': s.aprobado_en ? new Date(s.aprobado_en).toLocaleString('es') : '',
      'Despachado': s.despachado_en ? new Date(s.despachado_en).toLocaleString('es') : '',
      'Devuelto': dev ? dev.items.filter(i => i.devuelve > 0).map(i => `${i.desc}:${i.devuelve}`).join('; ') : ''
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Solicitudes');
  XLSX.writeFile(wb, `despachos_GEO_${new Date().toISOString().slice(0, 10)}.xlsx`);
  toast('✅ Excel descargado');
}
